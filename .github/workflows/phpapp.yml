name: PHP CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: phpapp
          MYSQL_ROOT_PASSWORD: root
          MYSQL_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, intl, mysqli, zip
        coverage: none
        tools: composer:v2
        ini-values: |
          opcache.enable=1
          opcache.enable_cli=1
          opcache.jit=0
          display_errors=On
          display_startup_errors=On
          error_reporting=E_ALL

    - name: Validate composer.json
      run: composer validate --strict

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Lint PHP files
      run: |
        find . \
          -path ./core/vendor -prune -o \
          -path ./node_modules -prune -o \
          -name '*.php' -print0 \
          | xargs -0 -n1 -P4 php -l > /dev/null
        echo "All PHP files lint clean"

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Build frontend assets
      run: |
        npm ci
        npm run build

    - name: Create .env file
      run: |
        cp .env.example .env
        sed -i 's/^DB_HOST=.*/DB_HOST="127.0.0.1"/' .env
        sed -i 's/^DB_NAME=.*/DB_NAME="phpapp"/' .env
        sed -i 's/^DB_USER=.*/DB_USER="root"/' .env
        sed -i 's/^DB_PASS=.*/DB_PASS="root"/' .env
        cat .env

    - name: Run migrations
      run: |
        php migrate.php migrate
        php migrate.php status

    - name: Start PHP server
      run: |
        php -S 127.0.0.1:8000 -t www > php-server.log 2>&1 &
        echo $! > php-server.pid

        sleep 2

        if ps -p $(cat php-server.pid) > /dev/null; then
          echo "PHP server process is running"
        else
          echo "PHP server failed to start"
          cat php-server.log
          exit 1
        fi

    - name: Wait for server
      run: |
        max_attempts=30
        attempt=1

        while [ $attempt -le $max_attempts ]; do
          if curl -s -f http://127.0.0.1:8000 > /dev/null 2>&1; then
            echo "Server is responding!"
            exit 0
          fi

          if ! ps -p $(cat php-server.pid) > /dev/null; then
            echo "PHP server has died. Server log:"
            cat php-server.log
            exit 1
          fi

          sleep 1
          attempt=$((attempt + 1))
        done

        echo "Server failed to respond after $max_attempts attempts"
        cat php-server.log
        exit 1

    - name: Smoke test pages
      run: |
        check() {
          url="$1"
          expected="$2"
          code=$(curl -s --path-as-is -o /dev/null -w '%{http_code}' "http://127.0.0.1:8000$url")
          if [ "$code" != "$expected" ]; then
            echo "FAIL: $url returned $code, expected $expected"
            cat php-server.log
            exit 1
          fi
          echo "OK: $url -> $code"
        }

        check "/" 200
        check "/catalog/csrf_protection" 200
        check "/catalog/pagination" 200
        check "/this-page-does-not-exist" 404
        check "/../config/web" 404
        check "/index/__get" 404

    - name: Show server log
      if: failure()
      run: cat php-server.log || true
